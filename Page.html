<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilmKeren</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --glass: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: #fff;
      min-height: 100vh;
    }

    /* Navbar */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(90deg, #e11d48, #f43f5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hamburger {
      font-size: 1.8rem;
      cursor: pointer;
      padding: 8px;
      z-index: 110;
    }

    /* Sidebar Menu */
    .sidebar {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100vh;
      background: rgba(15, 15, 26, 0.98);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--border);
      transition: right 0.4s ease;
      z-index: 200;
      padding: 2rem 1.5rem;
    }

    .sidebar.active {
      right: 0;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      margin: 1.2rem 0;
    }

    .sidebar ul li a {
      color: #ddd;
      text-decoration: none;
      font-size: 1.2rem;
      display: block;
      padding: 0.6rem 0;
      transition: color 0.3s;
    }

    .sidebar ul li a:hover {
      color: #e11d48;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s;
      z-index: 150;
    }

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* Hero */
    .hero {
      height: 82vh;
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .slide.active {
      opacity: 1;
    }

    .hero-content {
      position: absolute;
      bottom: 15%;
      left: 5%;
      right: 5%;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      max-width: 520px;
    }

    .hero-content h1 {
      font-size: 2.8rem;
      line-height: 1.1;
      margin-bottom: 0.8rem;
    }

    .hero-content p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 1.5rem;
    }

    .btn-play {
      background: #e11d48;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    /* Movie Grid */
    .section {
      padding: 3.5rem 5%;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.6rem;
    }

    .movie-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .movie-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 40px -10px rgba(225, 29, 72, 0.3);
    }

    .movie-card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }

    .movie-info {
      padding: 1rem;
    }

    .movie-info h3 {
      font-size: 1.1rem;
      line-height: 1.3;
    }

    .rating {
      margin-top: 8px;
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    footer {
      text-align: center;
      padding: 2.5rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">Film</div>
    <div class="hamburger" id="hamburger">☰</div>
  </nav>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">FilmKeren</div>
      <div class="hamburger" id="close">✕</div>
    </div>
    <ul>
      <li><a href="#">Beranda</a></li>
      <li><a href="#">Film</a></li>
      <li><a href="#">Series</a></li>
      <li><a href="#">Terbaru</a></li>
      <li><a href="#">Genre</a></li>
    </ul>
  </div>

  <!-- Hero -->
  <!-- Hero Slideshow -->
  <div class="hero">
    <div id="slide1" class="slide active" 
         style="background-image: url('https://i.imgur.com/5Xzw6xN.png');"></div>
    
    <div id="slide2" class="slide" 
         style="background-image: url('https://i.imgur.com/u2mJRr0.png');"></div>
    
    <!-- Hero Content tetap sama -->
    <div class="hero-content">
      <h1>Dune: Part Two</h1>
      <p>Petualangan epik di planet gurun yang tak terlupakan.</p>
      <button class="btn-play" onclick="alert('Memutar trailer...')">
        <i class="fa-solid fa-play"></i> Tonton Sekarang
      </button>
    </div>

    <!-- Dots -->
    <div style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:12px; z-index:10;">
      <div onclick="changeSlide(1)" style="width:14px;height:14px;background:#e11d48;border-radius:50%;cursor:pointer;"></div>
      <div onclick="changeSlide(2)" style="width:14px;height:14px;background:rgba(255,255,255,0.6);border-radius:50%;cursor:pointer;"></div>
    </div>
  </div>

  <!-- Section Film -->
  <div class="section">
    <h2>🔥 Film Populer Minggu Ini</h2>
    <div id="movieGrid" class="movie-grid"></div>
  </div>

  <footer>
    © 2026 neorodu • Glassmorphism Version
  </footer>

  <script>
    
  const movies = [
    {
      title: "Dune: Part Two",
      year: "2024",
      rating: "8.9",
      img: "https://i.imgur.com/PASTE_DIRECT_LINK_DISINI.jpg",   // ← ganti dengan direct link tante
      link: "https://example.com/film/dune-part-two.html"        // ← ganti dengan halaman detail
    },
    {
      title: "Oppenheimer",
      year: "2023",
      rating: "8.5",
      img: "https://picsum.photos/id/201/400/560",
      link: "https://example.com/film/oppenheimer.html"
    },
    {
      title: "The Batman",
      year: "2022",
      rating: "8.2",
      img: "https://picsum.photos/id/237/400/560",
      link: "https://example.com/film/the-batman.html"
    },
    {
      title: "Furiosa",
      year: "2024",
      rating: "8.1",
      img: "https://picsum.photos/id/870/400/560",
      link: "https://example.com/film/furiosa.html"
    },
    {
      title: "Challengers",
      year: "2024",
      rating: "7.9",
      img: "https://picsum.photos/id/1016/400/560",
      link: "https://example.com/film/challengers.html"
    },
    {
      title: "Deadpool & Wolverine",
      year: "2024",
      rating: "8.4",
      img: "https://picsum.photos/id/133/400/560",
      link: "https://example.com/film/deadpool-wolverine.html"
    }
  ];

  function renderMovies() {
    const grid = document.getElementById('movieGrid');
    grid.innerHTML = movies.map(movie => `
      <a href="${movie.link}" target="_blank" style="text-decoration: none; color: inherit;">
        <div class="movie-card">
          <img src="${movie.img}" alt="${movie.title}">
          <div class="movie-info">
            <h3>${movie.title}</h3>
            <p style="opacity:0.7; margin-top:4px;">${movie.year}</p>
            <div class="rating">⭐ ${movie.rating}</div>
          </div>
        </div>
      </a>
    `).join('');
  }

 

    // Hamburger Menu
    const hamburger = document.getElementById('hamburger');
    const closeBtn = document.getElementById('close');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function openMenu() {
      sidebar.classList.add('active');
      overlay.classList.add('active');
    }

    function closeMenu() {
      sidebar.classList.remove('active');
      overlay.classList.remove('active');
    }

    hamburger.addEventListener('click', openMenu);
    closeBtn.addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);

    // Slideshow
    let currentSlide = 1;
    function showSlide(n) {
      document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
      document.getElementById(`slide${n}`).classList.add('active');
      currentSlide = n;
    }

    function changeSlide(n) {
      showSlide(n);
    }

    setInterval(() => {
      let next = currentSlide === 2 ? 1 : currentSlide + 1;
      showSlide(next);
    }, 6500);

    // Init
    window.onload = () => {
      renderMovies();
      showSlide(1);
    };
  </script>
</body>
</html>
