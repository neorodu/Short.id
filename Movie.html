<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FilmKeren - Glass Edition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Navbar Glass */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #e11d48, #f43f5e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links a {
      color: #ddd;
      margin: 0 1.2rem;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: #e11d48;
    }

    .search-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 0.7rem 1.2rem;
      width: 320px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
      font-size: 1rem;
    }

    /* Hero Slideshow Glass */
    .hero {
      height: 85vh;
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease;
      display: flex;
      align-items: flex-end;
      padding: 8% 5%;
    }

    .slide.active {
      opacity: 1;
    }

    .hero-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .hero-content h1 {
      font-size: 3.2rem;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .hero-content p {
      font-size: 1.2rem;
      margin-bottom: 1.8rem;
      opacity: 0.9;
    }

    .btn-play {
      background: #e11d48;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-play:hover {
      background: #f43f5e;
      transform: scale(1.05);
    }

    /* Section Film */
    .section {
      padding: 4rem 5%;
    }

    .section h2 {
      font-size: 2.2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.8rem;
    }

    .movie-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .movie-card:hover {
      transform: translateY(-15px) scale(1.06);
      box-shadow: 0 25px 50px -12px rgba(225, 29, 72, 0.35);
    }

    .movie-card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .movie-card:hover img {
      transform: scale(1.1);
    }

    .movie-info {
      padding: 1.2rem;
    }

    .movie-info h3 {
      font-size: 1.15rem;
      margin-bottom: 0.4rem;
    }

    .rating {
      background: rgba(0,0,0,0.4);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Dots Slideshow */
    .dots {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    .dot {
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s;
    }

    .dot.active {
      background: #e11d48;
      transform: scale(1.3);
    }

    footer {
      text-align: center;
      padding: 3rem;
      opacity: 0.7;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <!-- Navbar Glass -->
  <nav>
    <div class="logo">FilmKeren</div>
    <div class="nav-links">
      <a href="#">Beranda</a>
      <a href="#">Film</a>
      <a href="#">Series</a>
      <a href="#">Terbaru</a>
      <a href="#">Genre</a>
    </div>
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="search" placeholder="Cari film...">
    </div>
  </nav>

  <!-- Hero Slideshow -->
  <div class="hero">
    <div id="slide1" class="slide active" style="background-image: url('https://picsum.photos/id/1015/1920/1080');">
      <div class="hero-content">
        <h1>Dune: Part Two</h1>
        <p>Petualangan epik di planet gurun yang tak terlupakan.</p>
        <button class="btn-play" onclick="alert('Memutar trailer Dune...')">
          <i class="fa-solid fa-play"></i> Tonton Sekarang
        </button>
      </div>
    </div>

    <div id="slide2" class="slide" style="background-image: url('https://picsum.photos/id/201/1920/1080');">
      <div class="hero-content">
        <h1>Oppenheimer</h1>
        <p>Kisah nyata di balik bom atom yang mengubah dunia.</p>
        <button class="btn-play" onclick="alert('Memutar trailer Oppenheimer...')">
          <i class="fa-solid fa-play"></i> Tonton Sekarang
        </button>
      </div>
    </div>

    <div class="dots">
      <div class="dot active" onclick="changeSlide(1)"></div>
      <div class="dot" onclick="changeSlide(2)"></div>
    </div>
  </div>

  <!-- Daftar Film Grid -->
  <div class="section">
    <h2><span style="color:#e11d48;">🔥</span> Film Populer Minggu Ini</h2>
    <div id="movieGrid" class="movie-grid">
      <!-- Diisi oleh JavaScript -->
    </div>
  </div>

  <footer>
    © 2026 FilmKeren • Versi Glassmorphism buat tante ❤️
  </footer>

  <script>
    // Data film
    const movies = [
      {title: "Dune: Part Two", year: "2024", rating: "8.9", img: "https://picsum.photos/id/1015/400/560"},
      {title: "Oppenheimer", year: "2023", rating: "8.5", img: "https://picsum.photos/id/201/400/560"},
      {title: "The Batman", year: "2022", rating: "8.2", img: "https://picsum.photos/id/237/400/560"},
      {title: "Furiosa", year: "2024", rating: "8.1", img: "https://picsum.photos/id/870/400/560"},
      {title: "Challengers", year: "2024", rating: "7.9", img: "https://picsum.photos/id/1016/400/560"},
      {title: "Deadpool & Wolverine", year: "2024", rating: "8.4", img: "https://picsum.photos/id/133/400/560"},
      {title: "Kingdom of the Planet of the Apes", year: "2024", rating: "7.8", img: "https://picsum.photos/id/180/400/560"},
    ];

    // Render grid movie
    function renderMovies() {
      const grid = document.getElementById('movieGrid');
      grid.innerHTML = movies.map(movie => `
        <div class="movie-card">
          <img src="${movie.img}" alt="${movie.title}">
          <div class="movie-info">
            <h3>${movie.title}</h3>
            <p style="opacity:0.7; font-size:0.95rem;">${movie.year}</p>
            <div class="rating" style="margin-top:12px;">
              ⭐ ${movie.rating}
            </div>
          </div>
        </div>
      `).join('');
    }

    // Slideshow sederhana
    let currentSlide = 1;
    function showSlide(n) {
      document.querySelectorAll('.slide').forEach(slide => slide.classList.remove('active'));
      document.getElementById(`slide${n}`).classList.add('active');

      document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i + 1 === n);
      });
      currentSlide = n;
    }

    function changeSlide(n) {
      showSlide(n);
    }

    // Auto slide
    setInterval(() => {
      let next = currentSlide === 2 ? 1 : currentSlide + 1;
      showSlide(next);
    }, 7000);

    // Search sederhana
    document.getElementById('search').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        alert('Mencari film: ' + this.value);
      }
    });

    // Inisialisasi
    window.onload = () => {
      renderMovies();
      showSlide(1);
    };
  </script>
</body>
</html>
